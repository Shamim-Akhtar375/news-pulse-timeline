services:
  # 1. Backend Web Service running Docker
  - type: web
    name: news-pulse-backend
    env: docker
    dockerFilePath: Dockerfile
    dockerContext: .
    plan: free # Free tier by default. Change to "starter" if you enable the persistent disk below.
    envVars:
      - key: PORT
        value: 8000
      - key: DATABASE_PATH
        value: ./news_pulse.db # Local database. Change to /data/news_pulse.db if using a persistent disk.
      - key: DATABASE_URL
        value: sqlite:///./news_pulse.db # Local database URL. Change to sqlite:////data/news_pulse.db if using a persistent disk.
      - key: SIMILARITY_THRESHOLD
        value: 0.40
    # To enable persistence, change the plan above to "starter" and uncomment this disk block:
    # disk:
    #   name: news-pulse-data
    #   mountPath: /data
    #   sizeGB: 1

  # 2. Frontend Static Site
  - type: web
    name: news-pulse-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false # Render will prompt you to enter the public URL of the backend (e.g. https://news-pulse-backend.onrender.com) during deployment.
